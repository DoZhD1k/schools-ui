stages:
  - containerize
  - deploy-k8s

variables:
  DOCKER_BUILD_ARGS: >
    --build-arg NEXT_PUBLIC_BASE_PATH=/module-school-ranking
    --build-arg NEXT_PUBLIC_AUTH_API_URL=$NEXT_PUBLIC_AUTH_API_URL
    --build-arg NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL

include:
  - project: 'opendata/devops/templates'
    file: 'build/containerize.yaml'
  - project: 'opendata/devops/templates'
    file: 'deploy/k8s-deploy.yaml'
